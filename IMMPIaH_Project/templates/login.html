<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
    font-family: Arial;
}

form {
    margin-top: 120px;
}

input {
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    width: 200px;
}

button {
    padding: 10px 20px;
    border-radius: 10px;
    background: #38bdf8;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🔐 IMMPIaH Login</h1>

<form method="POST">
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Login</button>
</form>

</body>
</html>
